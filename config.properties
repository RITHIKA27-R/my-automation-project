# ==========================================================
# ANDROID CONFIGURATION (Fixed for Vivo V2168 - Android 14)
# ==========================================================
# APK File Path (Double backslash is mandatory for Java)
ANDROID_APP_PATH=C:\\MobileAutomation\\Apps\\app-smartSchool-release.apk

# Your Device ID from adb devices
ANDROID_DEVICE_NAME=15930980480004Q

# Correct Package and Activity for your SmartSchool App
ANDROID_APP_PACKAGE=com.vijayantech.smartschoolparent
ANDROID_APP_ACTIVITY=com.vijayantech.MainActivity

# Match with your real phone's OS version
ANDROID_PLATFORM_VERSION=14

# ==========================================================
# APPIUM SERVER CONFIGURATION
# ==========================================================
# Appium 2.x - Remove /wd/hub to fix 404 Error
APPIUM_SERVER_URL=http://127.0.0.1:4723/

# ==========================================================
# COMMON SETTINGS
# ==========================================================
IMPLICIT_WAIT=10
EXPLICIT_WAIT=15
SCREENSHOT_PATH=target/screenshots/

# Verification URL for webview/dashboard (if applicable)
EXPECTED_DASHBOARD_URL=https://your.actual.smartschool.dashboard.url

# ==========================================================
# IOS CONFIGURATION (Disabled for Windows Environment)
# ==========================================================
IOS_APP_PATH=C:\\path\\to\\your\\smartschool-parent.ipa
IOS_DEVICE_NAME=iPhone 14
IOS_PLATFORM_VERSION=16.4
IOS_BUNDLE_ID=com.smartschool.parent